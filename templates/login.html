<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng nhập hệ thống</title>

    <link rel="stylesheet" href="/static/css/login.css">
</head>

<body>

    <div class="container">

        <h2>ĐĂNG NHẬP HỆ THỐNG THI TRẮC NGHIỆM</h2>

        <form id="loginForm">

            <!-- ROLE -->
            <div class="role-area">
                <label>
                    <input type="radio" name="role" value="GIANGVIEN" checked onclick="doiLabel()">
                    GIẢNG VIÊN
                </label>

                <label>
                    <input type="radio" name="role" value="SINHVIEN" onclick="doiLabel()">
                    SINH VIÊN
                </label>
            </div>

            <!-- USERNAME -->
            <div class="form-row">
                <label id="loginLabel">Login</label>
                <input type="text" name="username">
                <p id="error-username" class="error"></p>
            </div>

            <!-- PASSWORD -->
            <div class="form-row">
                <label>Password</label>
                <input type="password" name="password">
                <p id="error-password" class="error"></p>
            </div>

            <div class="button-area">
                <button type="submit">Đăng nhập</button>
                <button type="reset">Làm lại</button>
            </div>

        </form>

    </div>

    <script>

        function doiLabel() {
            const role = document.querySelector('input[name="role"]:checked').value;
            document.getElementById("loginLabel").innerText =
                role === "SINHVIEN" ? "Mã SV" : "Login";
        }

        document.addEventListener("DOMContentLoaded", function () {

            const form = document.getElementById("loginForm");

            const errUser = document.getElementById("error-username");
            const errPass = document.getElementById("error-password");

            form.addEventListener("submit", async function (e) {
                e.preventDefault();

                // reset lỗi
                errUser.innerText = "";
                errPass.innerText = "";

                const username = document.querySelector('input[name="username"]').value.trim();
                const password = document.querySelector('input[name="password"]').value.trim();
                const role = document.querySelector('input[name="role"]:checked').value;

                let hasError = false;

                // ================= FRONTEND VALIDATION =================
                if (!username) {
                    if (role === "SINHVIEN") {
                        errUser.innerText = "❌ Vui lòng nhập mã sinh viên";
                    } else {
                        errUser.innerText = "❌ Vui lòng nhập login name";
                    }
                    hasError = true;
                }

                if (!password) {
                    errPass.innerText = "❌ Vui lòng nhập password";
                    hasError = true;
                }

                if (hasError) return;

                // ================= FETCH LOGIN =================
                try {
                    const res = await fetch('/user/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password, role })
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        throw data;
                    }

                    // success
                    localStorage.setItem("user", JSON.stringify(data));
                    window.location.href = "/user/info";

                } catch (error) {


                    const data = error.detail;

                    if (data?.field === "username") {
                        errUser.innerText = data.message;
                    }

                    if (data?.field === "password") {
                        errPass.innerText = data.message;
                    }
                }
            });

        });

    </script>

</body>

</html>
